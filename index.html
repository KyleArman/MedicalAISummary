<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Summary</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg: #ffffff;
            --card-bg: #ffffff;
            --card-border: #dce6f5;
            --card-shadow: 0 4px 20px rgba(15, 61, 115, 0.08);
            --navy: #0f2942;
            --deep-blue: #0f3d73;
            --royal-blue: #1e5fa8;
            --accent-blue: #0ea5e9;
            --muted-blue: #6b8aad;
            --divider-blue: #cfe0f5;
            --danger: #d64545;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 12px;
            background-color: var(--bg);
            min-height: 100vh;
        }

        .page-wrapper {
            max-width: 700px;
            margin: 0 auto;
        }

        /* MAP CARD */
        .map-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
        }
        .map-card h4 {
            color: var(--deep-blue);
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            margin: 0 0 10px 0;
            letter-spacing: 0.5px;
        }
        .map-card img { width: 100%; height: auto; border-radius: 8px; display: block; }

        /* SUMMARY PANEL */
        .summary-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
        }
        .summary-row {
            display: flex;
            align-items: flex-start;
            border-bottom: 1px solid var(--divider-blue);
            padding: 10px 14px;
            gap: 10px;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-label {
            color: var(--royal-blue);
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 130px;
            flex-shrink: 0;
            padding-top: 2px;
        }
        .summary-value {
            color: var(--navy);
            font-size: 0.9rem;
            font-weight: 500;
            flex: 1;
            line-height: 1.6;
        }
        .consent-tag {
            color: var(--muted-blue);
            font-size: 0.8rem;
            font-weight: 400;
        }

        /* SECTION CARD (shared by Next Station + Patient Summary) */
        .section-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
        }
        .section-title {
            color: var(--deep-blue);
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.4px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: var(--accent-blue);
            border-radius: 2px;
        }

        /* NEXT STATION — single destination card (not a multi-step list) */
        .next-station {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .next-station .station-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--royal-blue), var(--accent-blue));
            color: #ffffff;
            box-shadow: 0 3px 10px rgba(14, 165, 233, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
            font-weight: 700;
        }
        .next-station .station-info { flex: 1; }
        .next-station .station-name { color: var(--deep-blue); font-weight: 600; font-size: 0.95rem; }
        .next-station .station-sub  { color: var(--muted-blue); font-size: 0.8rem; margin-top: 2px; }
        .next-station .station-location {
            color: var(--muted-blue);
            font-size: 0.78rem;
            margin-top: 4px;
        }

        /* PATIENT SUMMARY TABLE (formerly "Medical Test Summary") */
        .dr-row {
            display: flex;
            flex-wrap: wrap;
            padding: 8px 4px;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--divider-blue);
            align-items: center;
        }
        .dr-row:last-child { border-bottom: none; }
        .dr-row div { padding: 2px 4px; }
        .col-test      { flex: 28%; color: var(--navy); font-weight: 500; }
        .col-indicator { flex: 10%; text-align: center; }
        .col-symptom   { flex: 38%; color: var(--muted-blue); }
        .col-consent   { flex: 24%; color: var(--muted-blue); font-size: 0.8rem; }
        .fw-header .col-test,
        .fw-header .col-symptom,
        .fw-header .col-consent {
            color: var(--royal-blue);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        @media (max-width: 480px) {
            .dr-row { flex-direction: column; gap: 3px; }
            .col-test, .col-indicator, .col-symptom, .col-consent { flex: 100%; min-width: auto; text-align: left; }
            .fw-header { display: none; }
        }

        .indicator { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
        .indicator.blue { background-color: var(--accent-blue); box-shadow: 0 0 6px rgba(14, 165, 233, 0.5); }
        .indicator.red  { background-color: var(--danger); box-shadow: 0 0 6px rgba(214, 69, 69, 0.4); }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- MAP -->
    <div class="map-card">
        <h4>UTM Health Center Map</h4>
        <img src="PKUMap.png" alt="PKU Map">
    </div>

    <!-- PATIENT OVERVIEW (name / queue / symptoms at a glance) -->
    <div class="summary-panel" id="summaryPanel">
        <div class="summary-row">
            <span class="summary-label">Name:</span>
            <span class="summary-value" id="patientName">—</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Queue Number:</span>
            <span class="summary-value" id="queueNumber">—</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">Symptoms:</span>
            <span class="summary-value" id="symptomsDisplay">—</span>
        </div>
    </div>

    <!-- NEXT STATION — shows only the single place the patient needs to go next -->
    <div class="section-card">
        <p class="section-title">Next Station</p>
        <div class="next-station" id="nextStationDisplay">
            <div class="station-icon">&#9654;</div>
            <div class="station-info">
                <div class="station-name" id="nextStationName">—</div>
                <div class="station-sub" id="nextStationSub">—</div>
                <div class="station-location" id="nextStationLocation" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- PATIENT SUMMARY (renamed from "Medical Test Summary") -->
    <div class="section-card">
        <p class="section-title">Patient Summary</p>

        <div class="dr-row fw-header">
            <div class="col-test">Medical Test</div>
            <div class="col-indicator" style="color:var(--royal-blue);font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Status</div>
            <div class="col-symptom">Symptoms</div>
            <div class="col-consent">Consent</div>
        </div>

        <div class="dr-row" id="bloodRow" style="display:none">
            <div class="col-test">Blood Test</div>
            <div class="col-indicator"><span id="bloodIndicator" class="indicator"></span></div>
            <div class="col-symptom" id="bloodSymptoms"></div>
            <div class="col-consent" id="btConsent"></div>
        </div>

        <div class="dr-row" id="urineRow" style="display:none">
            <div class="col-test">Urine Test</div>
            <div class="col-indicator"><span id="urineIndicator" class="indicator"></span></div>
            <div class="col-symptom" id="urineSymptoms"></div>
            <div class="col-consent" id="utConsent"></div>
        </div>

        <div class="dr-row" id="rbstRow" style="display:none">
            <div class="col-test">Rapid Blood Sugar Test</div>
            <div class="col-indicator"><span id="rbstIndicator" class="indicator"></span></div>
            <div class="col-symptom" id="rbstSymptoms"></div>
            <div class="col-consent" id="rbstConsent"></div>
        </div>

        <div class="dr-row" id="xRayRow" style="display:none">
            <div class="col-test">X-Ray</div>
            <div class="col-indicator"><span id="xRayIndicator" class="indicator"></span></div>
            <div class="col-symptom" id="xRaySymptoms"></div>
            <div class="col-consent" id="xrConsent"></div>
        </div>

        <div class="dr-row" id="bpRow" style="display:none">
            <div class="col-test">Blood Pressure Test</div>
            <div class="col-indicator"><span id="bpIndicator" class="indicator blue"></span></div>
            <div class="col-symptom" id="bpSymptoms"></div>
            <div class="col-consent" id="bpConsent"></div>
        </div>

    </div>

</div><!-- end page-wrapper -->

<script src="bootstrap.bundle.min.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);

    /* 1. PATIENT OVERVIEW PANEL */
    const symptomLabels = {
        fever:            "Fever",
        cough:            "Cough",
        headache:         "Headache",
        urinaryHesitancy: "Urinary Hesitancy",
        urinaryFrequency: "Urinary Frequency",
        amenorrhea:       "Amenorrhea"
    };

    if (params.get('name'))  document.getElementById('patientName').textContent  = decodeURIComponent(params.get('name'));
    if (params.get('queue')) document.getElementById('queueNumber').textContent  = params.get('queue');

    function buildSymptomsHTML() {
        const parts = Object.keys(symptomLabels)
            .filter(k => params.get(k) === "1")
            .map(k => {
                let label = symptomLabels[k];
                let extra = "";
                if (k === "fever") { const d = parseInt(params.get("durationFever")) || 0; extra = ` (${d} days)`; }
                if (k === "cough") { const d = parseInt(params.get("durationCough")) || 0; extra = ` (${d} days)`; }
                let consentNote = "";
                if (k === "fever") {
                    const d = parseInt(params.get("durationFever")) || 0;
                    if (d >= 3) { consentNote = params.get("btConsent") === "1" ? " (Consent)" : " (No Consent)"; }
                }
                return `<span style="display:inline-block;margin-right:10px;">${label}${extra}<span class="consent-tag">${consentNote}</span></span>`;
            });
        return parts.length ? parts.join("") : "—";
    }
    document.getElementById('symptomsDisplay').innerHTML = buildSymptomsHTML();

    /* 2. NEXT STATION — determine the full priority order internally (same
       priority as before: lab tests -> X-ray -> BP -> doctor -> pharmacy),
       but only DISPLAY the single next stop, not the whole route. */
    const hasBlood = params.get("bloodTest") === "1";
    const hasUrine = params.get("urineTest") === "1";
    const hasRbst  = params.get("rapidBloodSugarTest") === "1";
    const hasXRay  = params.get("xRay") === "1";
    const hasBP    = params.get("bloodPressureTest") === "1";

    const stationDefs = {
        stLab:      { name: "Lab Sample Counter",             sub: "Blood Test \u00b7 Urine Test \u00b7 Rapid Blood Sugar Test" },
        stXRay:     { name: "Diagnostic Laboratory",          sub: "X-Ray" },
        stBP:       { name: "Doctor's Room",                  sub: "Blood Pressure Test" },
        stDoctor:   { name: "Doctor's Consultation Room",     sub: "See the Doctor" },
        stPharmacy: { name: "Pharmacy Counter",               sub: "Collect Prescribed Medicine" }
    };

    const stationOrder = [];
    if (hasBlood || hasUrine || hasRbst) stationOrder.push("stLab");
    if (hasXRay)  stationOrder.push("stXRay");
    if (hasBP)    stationOrder.push("stBP");
    stationOrder.push("stDoctor");
    stationOrder.push("stPharmacy");

    const nextKey = stationOrder[0];
    const nextStation = stationDefs[nextKey];

    document.getElementById('nextStationName').textContent = nextStation.name;
    document.getElementById('nextStationSub').textContent = nextStation.sub;

    // Optional: if a location/room identifier is present (e.g. from OPD auto-assignment),
    // show it under the station name. Degrades gracefully if the param isn't present.
    const locationParam = params.get('location');
    if (locationParam) {
        const locEl = document.getElementById('nextStationLocation');
        locEl.textContent = "Location: " + decodeURIComponent(locationParam);
        locEl.style.display = "block";
    }

    /* 3. PATIENT SUMMARY TABLE (test rows) */
    function buildSymptoms(keys) {
        const found = keys.filter(k => params.get(k) === "1").map(k => {
            if (k === "fever") return `Fever (${parseInt(params.get("durationFever")) || 0} days)`;
            if (k === "cough") return `Cough (${parseInt(params.get("durationCough")) || 0} days)`;
            return symptomLabels[k] || k;
        });
        return found.length ? found.join(", ") : null;
    }

    function updateDrView(testKey, consentKey, rowId, indicatorId, symptomsId, consentId, symptomKeys) {
        const row        = document.getElementById(rowId);
        const indicator  = document.getElementById(indicatorId);
        const symptomsEl = document.getElementById(symptomsId);
        const consentEl  = document.getElementById(consentId);

        const symptomText = buildSymptoms(symptomKeys);
        if (!symptomText) { row.style.display = "none"; return; }

        row.style.display = "flex";
        symptomsEl.textContent = symptomText;

        let finalConsent = "-";
        if (testKey === "bloodTest") {
            const d = parseInt(params.get("durationFever")) || 0;
            finalConsent = d < 3 ? "-" : (params.get(consentKey) === "1" ? "Consent" : "No Consent");
        } else if (testKey === "xRay") {
            const d = parseInt(params.get("durationCough")) || 0;
            finalConsent = d < 21 ? "-" : (params.get(consentKey) === "1" ? "Consent" : "No Consent");
        } else if (testKey === "bloodPressureTest") {
            finalConsent = "";
        } else {
            finalConsent = params.get(consentKey) === "1" ? "Consent" : "No Consent";
        }

        consentEl.textContent = finalConsent;
        indicator.className = "indicator " + (finalConsent === "Consent" ? "blue" : "red");
        if (testKey === "bloodPressureTest") indicator.className = "indicator blue";
    }

    updateDrView("bloodTest",          "btConsent",   "bloodRow","bloodIndicator","bloodSymptoms","btConsent",   ["fever"]);
    updateDrView("urineTest",          "utConsent",   "urineRow","urineIndicator","urineSymptoms","utConsent",   ["urinaryHesitancy","amenorrhea"]);
    updateDrView("rapidBloodSugarTest","rbstConsent", "rbstRow", "rbstIndicator", "rbstSymptoms", "rbstConsent", ["urinaryFrequency"]);
    updateDrView("xRay",               "xrConsent",   "xRayRow", "xRayIndicator", "xRaySymptoms", "xrConsent",   ["cough"]);
    updateDrView("bloodPressureTest",  "bpConsent",   "bpRow",   "bpIndicator",   "bpSymptoms",   "bpConsent",   ["headache"]);
</script>
</body>
</html>
